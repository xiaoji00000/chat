<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chat</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #1a1a2e; color: #eee; height: 100vh; display: flex; }
        
        /* 侧边栏 */
        .sidebar { width: 260px; background: #16213e; display: flex; flex-direction: column; border-right: 1px solid #333; }
        .sidebar-header { padding: 15px; border-bottom: 1px solid #333; }
        .new-chat-btn { width: 100%; padding: 12px; background: #0f3460; border: 1px solid #444; color: #fff; border-radius: 8px; cursor: pointer; font-size: 14px; }
        .new-chat-btn:hover { background: #1a4a7a; }
        .chat-list { flex: 1; overflow-y: auto; padding: 10px; }
        .chat-item { padding: 12px; margin-bottom: 5px; background: #1a1a2e; border-radius: 8px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .chat-item:hover, .chat-item.active { background: #0f3460; }
        .chat-item-title { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 14px; }
        .chat-item-delete { color: #666; padding: 5px; display: none; }
        .chat-item:hover .chat-item-delete { display: block; }
        .chat-item-delete:hover { color: #e94560; }
        .settings-btn { padding: 15px; border-top: 1px solid #333; }
        .settings-btn button { width: 100%; padding: 10px; background: transparent; border: 1px solid #444; color: #aaa; border-radius: 8px; cursor: pointer; }
        .settings-btn button:hover { background: #1a1a2e; color: #fff; }

        /* 主聊天区 */
        .main { flex: 1; display: flex; flex-direction: column; }
        .chat-header { padding: 15px 20px; border-bottom: 1px solid #333; font-weight: 500; }
        .messages { flex: 1; overflow-y: auto; padding: 20px; }
        .message { margin-bottom: 20px; display: flex; gap: 12px; }
        .message.user { flex-direction: row-reverse; }
        .message-avatar { width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }
        .message.assistant .message-avatar { background: #0f3460; }
        .message.user .message-avatar { background: #e94560; }
        .message-content { max-width: 70%; padding: 12px 16px; border-radius: 12px; line-height: 1.6; white-space: pre-wrap; word-break: break-word; }
        .message.assistant .message-content { background: #16213e; border-bottom-left-radius: 4px; }
        .message.user .message-content { background: #0f3460; border-bottom-right-radius: 4px; }

        /* 输入区 */
        .input-area { padding: 20px; border-top: 1px solid #333; }
        .input-wrapper { display: flex; gap: 10px; max-width: 800px; margin: 0 auto; }
        .input-wrapper textarea { flex: 1; padding: 12px 16px; background: #16213e; border: 1px solid #333; color: #eee; border-radius: 12px; resize: none; font-size: 14px; font-family: inherit; min-height: 48px; max-height: 200px; }
        .input-wrapper textarea:focus { outline: none; border-color: #0f3460; }
        .send-btn { padding: 12px 24px; background: #e94560; border: none; color: #fff; border-radius: 12px; cursor: pointer; font-size: 14px; }
        .send-btn:hover { background: #ff6b6b; }
        .send-btn:disabled { background: #444; cursor: not-allowed; }

        /* 设置弹窗 */
        .modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); align-items: center; justify-content: center; z-index: 100; }
        .modal.show { display: flex; }
        .modal-content { background: #16213e; border-radius: 16px; padding: 24px; width: 90%; max-width: 500px; max-height: 80vh; overflow-y: auto; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .modal-header h2 { font-size: 18px; }
        .modal-close { background: none; border: none; color: #aaa; font-size: 24px; cursor: pointer; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; margin-bottom: 6px; color: #aaa; font-size: 13px; }
        .form-group input, .form-group select { width: 100%; padding: 10px 12px; background: #1a1a2e; border: 1px solid #333; color: #eee; border-radius: 8px; font-size: 14px; }
        .form-group input:focus, .form-group select:focus { outline: none; border-color: #0f3460; }
        .save-btn { width: 100%; padding: 12px; background: #e94560; border: none; color: #fff; border-radius: 8px; cursor: pointer; font-size: 14px; margin-top: 10px; }
        .save-btn:hover { background: #ff6b6b; }
        .preset-btns { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
        .preset-btn { padding: 6px 12px; background: #1a1a2e; border: 1px solid #333; color: #aaa; border-radius: 6px; cursor: pointer; font-size: 12px; }
        .preset-btn:hover { border-color: #e94560; color: #fff; }

        /* 响应式 */
        @media (max-width: 768px) {
            .sidebar { display: none; position: fixed; top: 0; left: 0; bottom: 0; z-index: 50; }
            .sidebar.show { display: flex; }
            .menu-btn { display: block !important; }
            .message-content { max-width: 85%; }
        }
        .menu-btn { display: none; background: none; border: none; color: #eee; font-size: 24px; cursor: pointer; margin-right: 10px; }
        .overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 40; }
        .overlay.show { display: block; }

        /* 加载动画 */
        .typing { display: flex; gap: 4px; padding: 8px 0; }
        .typing span { width: 8px; height: 8px; background: #aaa; border-radius: 50%; animation: bounce 1.4s infinite ease-in-out; }
        .typing span:nth-child(1) { animation-delay: -0.32s; }
        .typing span:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }
    </style>
</head>
<body>
    <div class="overlay" onclick="toggleSidebar()"></div>
    
    <div class="sidebar">
        <div class="sidebar-header">
            <button class="new-chat-btn" onclick="newChat()">+ 新对话</button>
        </div>
        <div class="chat-list" id="chatList"></div>
        <div class="settings-btn">
            <button onclick="openSettings()">⚙️ API 设置</button>
        </div>
    </div>

    <div class="main">
        <div class="chat-header">
            <button class="menu-btn" onclick="toggleSidebar()">☰</button>
            <span id="chatTitle">新对话</span>
        </div>
        <div class="messages" id="messages"></div>
        <div class="input-area">
            <div class="input-wrapper">
                <textarea id="input" placeholder="输入消息..." rows="1" onkeydown="handleKeydown(event)"></textarea>
                <button class="send-btn" id="sendBtn" onclick="sendMessage()">发送</button>
            </div>
        </div>
    </div>

    <div class="modal" id="settingsModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>API 设置</h2>
                <button class="modal-close" onclick="closeSettings()">×</button>
            </div>
            <div class="preset-btns">
                <button class="preset-btn" onclick="setPreset('aipaibox')">Aipaibox</button>
                <button class="preset-btn" onclick="setPreset('openrouter')">OpenRouter</button>
                <button class="preset-btn" onclick="setPreset('deepseek')">DeepSeek</button>
            </div>
            <div class="form-group">
                <label>API 地址</label>
                <input type="text" id="apiUrl" placeholder="https://api.example.com/v1/chat/completions">
            </div>
            <div class="form-group">
                <label>API Key</label>
                <input type="password" id="apiKey" placeholder="sk-...">
            </div>
            <div class="form-group">
                <label>模型名称</label>
                <input type="text" id="model" placeholder="claude-3-5-sonnet-20241022">
            </div>
            <div class="form-group">
                <label>系统提示词（可选）</label>
                <input type="text" id="systemPrompt" placeholder="You are a helpful assistant.">
            </div>
            <button class="save-btn" onclick="saveSettings()">保存设置</button>
        </div>
    </div>

    <script>
        // 数据存储
        let chats = JSON.parse(localStorage.getItem('chats')) || [];
        let currentChatId = localStorage.getItem('currentChatId') || null;
        let settings = JSON.parse(localStorage.getItem('settings')) || {
            apiUrl: 'https://api.aipaibox.com/v1/chat/completions',
            apiKey: '',
            model: 'claude-sonnet-4-20250514',
            systemPrompt: ''
        };

        // 初始化
        function init() {
            if (chats.length === 0) newChat();
            else renderChatList();
            if (currentChatId) loadChat(currentChatId);
            autoResize(document.getElementById('input'));
        }

        // 新建对话
        function newChat() {
            const chat = {
                id: Date.now().toString(),
                title: '新对话',
                messages: []
            };
            chats.unshift(chat);
            saveChats();
            loadChat(chat.id);
            renderChatList();
        }

        // 渲染对话列表
        function renderChatList() {
            const list = document.getElementById('chatList');
            list.innerHTML = chats.map(chat => `
                <div class="chat-item ${chat.id === currentChatId ? 'active' : ''}" onclick="loadChat('${chat.id}')">
                    <span class="chat-item-title">${escapeHtml(chat.title)}</span>
                    <span class="chat-item-delete" onclick="event.stopPropagation(); deleteChat('${chat.id}')">🗑️</span>
                </div>
            `).join('');
        }

        // 加载对话
        function loadChat(id) {
            currentChatId = id;
            localStorage.setItem('currentChatId', id);
            const chat = chats.find(c => c.id === id);
            if (!chat) return;
            document.getElementById('chatTitle').textContent = chat.title;
            renderMessages(chat.messages);
            renderChatList();
            toggleSidebar(false);
        }

        // 渲染消息
        function renderMessages(messages) {
            const container = document.getElementById('messages');
            container.innerHTML = messages.map(msg => `
                <div class="message ${msg.role}">
                    <div class="message-avatar">${msg.role === 'user' ? '你' : 'AI'}</div>
                    <div class="message-content">${escapeHtml(msg.content)}</div>
                </div>
            `).join('');
            container.scrollTop = container.scrollHeight;
        }

        // 发送消息
        async function sendMessage() {
            const input = document.getElementById('input');
            const content = input.value.trim();
            if (!content) return;

            if (!settings.apiKey) {
                alert('请先设置 API Key');
                openSettings();
                return;
            }

            const chat = chats.find(c => c.id === currentChatId);
            if (!chat) return;

            // 添加用户消息
            chat.messages.push({ role: 'user', content });
            if (chat.title === '新对话') {
                chat.title = content.slice(0, 20) + (content.length > 20 ? '...' : '');
                document.getElementById('chatTitle').textContent = chat.title;
                renderChatList();
            }
            saveChats();
            renderMessages(chat.messages);
            input.value = '';
            autoResize(input);

            // 显示加载
            const messagesDiv = document.getElementById('messages');
            const loadingDiv = document.createElement('div');
            loadingDiv.className = 'message assistant';
            loadingDiv.innerHTML = `<div class="message-avatar">AI</div><div class="message-content"><div class="typing"><span></span><span></span><span></span></div></div>`;
            messagesDiv.appendChild(loadingDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;

            document.getElementById('sendBtn').disabled = true;

            try {
                const apiMessages = [];
                if (settings.systemPrompt) {
                    apiMessages.push({ role: 'system', content: settings.systemPrompt });
                }
                apiMessages.push(...chat.messages);

                const response = await fetch(settings.apiUrl, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${settings.apiKey}`
                    },
                    body: JSON.stringify({
                        model: settings.model,
                        messages: apiMessages,
                        max_tokens: 4096
                    })
                });

                if (!response.ok) {
                    const errorData = await response.json().catch(() => ({}));
                    throw new Error(errorData.error?.message || `HTTP ${response.status}`);
                }

                const data = await response.json();
                const assistantContent = data.choices[0].message.content;

                chat.messages.push({ role: 'assistant', content: assistantContent });
                saveChats();
                renderMessages(chat.messages);

            } catch (error) {
                loadingDiv.remove();
                alert('发送失败: ' + error.message);
            } finally {
                document.getElementById('sendBtn').disabled = false;
            }
        }

        // 删除对话
        function deleteChat(id) {
            if (!confirm('确定删除这个对话吗？')) return;
            chats = chats.filter(c => c.id !== id);
            if (currentChatId === id) {
                currentChatId = chats[0]?.id || null;
                if (currentChatId) loadChat(currentChatId);
                else newChat();
            }
            saveChats();
            renderChatList();
        }

        // 设置相关
        function openSettings() {
            document.getElementById('apiUrl').value = settings.apiUrl;
            document.getElementById('apiKey').value = settings.apiKey;
            document.getElementById('model').value = settings.model;
            document.getElementById('systemPrompt').value = settings.systemPrompt;
            document.getElementById('settingsModal').classList.add('show');
        }

        function closeSettings() {
            document.getElementById('settingsModal').classList.remove('show');
        }

        function saveSettings() {
            settings.apiUrl = document.getElementById('apiUrl').value;
            settings.apiKey = document.getElementById('apiKey').value;
            settings.model = document.getElementById('model').value;
            settings.systemPrompt = document.getElementById('systemPrompt').value;
            localStorage.setItem('settings', JSON.stringify(settings));
            closeSettings();
            alert('设置已保存');
        }

        function setPreset(name) {
            const presets = {
                aipaibox: { url: 'https://api.aipaibox.com/v1/chat/completions', model: 'claude-sonnet-4-20250514' },
                openrouter: { url: 'https://openrouter.ai/api/v1/chat/completions', model: 'anthropic/claude-sonnet-4' },
                deepseek: { url: 'https://api.deepseek.com/v1/chat/completions', model: 'deepseek-chat' }
            };
            const preset = presets[name];
            document.getElementById('apiUrl').value = preset.url;
            document.getElementById('model').value = preset.model;
        }

        // 工具函数
        function saveChats() {
            localStorage.setItem('chats', JSON.stringify(chats));
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function handleKeydown(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        }

        function autoResize(textarea) {
            textarea.style.height = 'auto';
            textarea.style.height = Math.min(textarea.scrollHeight, 200) + 'px';
        }

        document.getElementById('input').addEventListener('input', function() {
            autoResize(this);
        });

        function toggleSidebar(show) {
            const sidebar = document.querySelector('.sidebar');
            const overlay = document.querySelector('.overlay');
            if (show === undefined) show = !sidebar.classList.contains('show');
            sidebar.classList.toggle('show', show);
            overlay.classList.toggle('show', show);
        }

        init();
    </script>
</body>
</html>
