<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat - 个人工作台</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <div class="container">
        <aside class="sidebar">
            <div class="sidebar-section">
                <button id="new-chat-btn" class="primary-btn">➕ 新建对话</button>
            </div>

            <div class="sidebar-section session-container">
                <h3>对话历史</h3>
                <ul id="session-list" class="session-list"></ul>
            </div>

            <div class="sidebar-section">
                <h3>模型设置</h3>
                <input type="password" id="api-key" placeholder="Aipaibox API Key" />
                <select id="model-select">
                    <option value="claude-opus-4-7">Claude Opus 4.7</option>
                    <option value="claude-opus-4-6-thinking">Claude Opus 4.6 Thinking</option>
                </select>
            </div>
            
            <details class="memory-panel">
                <summary>🧠 分层记忆系统 (点击展开)</summary>
                <div class="memory-inputs">
                    <textarea id="mem-identity" placeholder="身份 (Identity)..."></textarea>
                    <textarea id="mem-context" placeholder="情境 (Context)..."></textarea>
                    <textarea id="mem-preferences" placeholder="偏好 (Preferences)..."></textarea>
                    <textarea id="mem-experience" placeholder="经验 (Experience)..."></textarea>
                    <textarea id="mem-activity" placeholder="活动 (Activity)..."></textarea>
                    <button id="save-mem-btn" class="secondary-btn">保存记忆配置</button>
                </div>
            </details>

            <button id="delete-session-btn" class="danger-btn" style="margin-top: 15px;">🗑️ 删除当前对话</button>
        </aside>

        <main class="chat-area">
            <div id="chat-history" class="chat-history"></div>
            
            <div class="input-area">
                <div id="image-preview" class="image-preview hidden"></div>
                <div class="controls">
                    <label for="image-upload" class="custom-upload-btn">📷 图片</label>
                    <input type="file" id="image-upload" accept="image/*" style="display: none;" />
                    
                    <textarea id="user-input" placeholder="输入消息... (Ctrl+Enter 发送)"></textarea>
                    <button id="send-btn" class="send-btn">发送</button>
                </div>
            </div>
        </main>
    </div>

    <script type="module" src="js/main.js"></script>
</body>
</html>
