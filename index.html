<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chat</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #1a1a2e; color: #eee; height: 100vh; display: flex; }
        
        .sidebar { width: 260px; background: #16213e; display: flex; flex-direction: column; border-right: 1px solid #333; }
        .sidebar-header { padding: 15px; border-bottom: 1px solid #333; }
        .new-chat-btn { width: 100%; padding: 12px; background: #0f3460; border: 1px solid #444; color: #fff; border-radius: 8px; cursor: pointer; font-size: 14px; }
        .new-chat-btn:hover { background: #1a4a7a; }
        .chat-list { flex: 1; overflow-y: auto; padding: 10px; }
        .chat-item { padding: 12px; margin-bottom: 5px; background: #1a1a2e; border-radius: 8px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .chat-item:hover, .chat-item.active { background: #0f3460; }
        .chat-item-title { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 14px; }
        .chat-item-delete { color: #666; padding: 5px; display: none; }
        .chat-item:hover .chat-item-delete { display: block; }
        .chat-item-delete:hover { color: #e94560; }
        
        .sidebar-footer { padding: 10px; border-top: 1px solid #333; }
        .current-api { padding: 10px; background: #1a1a2e; border-radius: 8px; margin-bottom: 10px; font-size: 12px; }
        .current-api-label { color: #888; margin-bottom: 4px; }
        .current-api-name { color: #4ade80; font-weight: 500; }
        .settings-btn { width: 100%; padding: 10px; background: transparent; border: 1px solid #444; color: #aaa; border-radius: 8px; cursor: pointer; }
        .settings-btn:hover { background: #1a1a2e; color: #fff; }

        .main { flex: 1; display: flex; flex-direction: column; }
        .chat-header { padding: 15px 20px; border-bottom: 1px solid #333; font-weight: 500; display: flex; align-items: center; }
        .messages { flex: 1; overflow-y: auto; padding: 20px; }
        .message { margin-bottom: 20px; display: flex; gap: 12px; }
        .message.user { flex-direction: row-reverse; }
        .message-avatar { width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }
        .message.assistant .message-avatar { background: #0f3460; }
        .message.user .message-avatar { background: #e94560; }
        .message-content { max-width: 70%; padding: 12px 16px; border-radius: 12px; line-height: 1.6; white-space: pre-wrap; word-break: break-word; }
        .message.assistant .message-content { background: #16213e; border-bottom-left-radius: 4px; }
        .message.user .message-content { background: #0f3460; border-bottom-right-radius: 4px; }
        .message-image { max-width: 300px; max-height: 300px; border-radius: 8px; margin-bottom: 8px; cursor: pointer; }
        .message-image:hover { opacity: 0.9; }

        .input-area { padding: 20px; border-top: 1px solid #333; }
        .image-preview { display: none; padding: 10px; margin-bottom: 10px; background: #16213e; border-radius: 8px; max-width: 800px; margin-left: auto; margin-right: auto; }
        .image-preview.show { display: flex; align-items: center; gap: 10px; }
        .image-preview img { max-height: 80px; border-radius: 8px; }
        .image-preview-remove { background: #e94560; border: none; color: white; width: 24px; height: 24px; border-radius: 50%; cursor: pointer; font-size: 16px; }
        .input-wrapper { display: flex; gap: 10px; max-width: 800px; margin: 0 auto; align-items: flex-end; }
        .input-wrapper textarea { flex: 1; padding: 12px 16px; background: #16213e; border: 1px solid #333; color: #eee; border-radius: 12px; resize: none; font-size: 14px; font-family: inherit; min-height: 48px; max-height: 200px; }
        .input-wrapper textarea:focus { outline: none; border-color: #0f3460; }
        .input-btns { display: flex; gap: 8px; }
        .upload-btn { padding: 12px 16px; background: #16213e; border: 1px solid #333; color: #aaa; border-radius: 12px; cursor: pointer; font-size: 18px; }
        .upload-btn:hover { background: #0f3460; color: #fff; }
        .send-btn { padding: 12px 24px; background: #e94560; border: none; color: #fff; border-radius: 12px; cursor: pointer; font-size: 14px; }
        .send-btn:hover { background: #ff6b6b; }
        .send-btn:disabled { background: #444; cursor: not-allowed; }

        .modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); align-items: center; justify-content: center; z-index: 100; }
        .modal.show { display: flex; }
        .modal-content { background: #16213e; border-radius: 16px; padding: 24px; width: 90%; max-width: 500px; max-height: 80vh; overflow-y: auto; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .modal-header h2 { font-size: 18px; }
        .modal-close { background: none; border: none; color: #aaa; font-size: 24px; cursor: pointer; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; margin-bottom: 6px; color: #aaa; font-size: 13px; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 10px 12px; background: #1a1a2e; border: 1px solid #333; color: #eee; border-radius: 8px; font-size: 14px; font-family: inherit; }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus { outline: none; border-color: #0f3460; }
        .form-group textarea { min-height: 80px; resize: vertical; }
        .save-btn { width: 100%; padding: 12px; background: #e94560; border: none; color: #fff; border-radius: 8px; cursor: pointer; font-size: 14px; margin-top: 10px; }
        .save-btn:hover { background: #ff6b6b; }
        
        .api-tabs { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
        .api-tab { padding: 8px 16px; background: #1a1a2e; border: 1px solid #333; color: #aaa; border-radius: 8px; cursor: pointer; font-size: 13px; }
        .api-tab:hover { border-color: #e94560; color: #fff; }
        .api-tab.active { background: #e94560; border-color: #e94560; color: #fff; }

        @media (max-width: 768px) {
            .sidebar { display: none; position: fixed; top: 0; left: 0; bottom: 0; z-index: 50; }
            .sidebar.show { display: flex; }
            .menu-btn { display: block !important; }
            .message-content { max-width: 85%; }
        }
        .menu-btn { display: none; background: none; border: none; color: #eee; font-size: 24px; cursor: pointer; margin-right: 10px; }
        .overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 40; }
        .overlay.show { display: block; }

        .typing { display: flex; gap: 4px; padding: 8px 0; }
        .typing span { width: 8px; height: 8px; background: #aaa; border-radius: 50%; animation: bounce 1.4s infinite ease-in-out; }
        .typing span:nth-child(1) { animation-delay: -0.32s; }
        .typing span:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }

        .image-modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.9); z-index: 200; align-items: center; justify-content: center; }
        .image-modal.show { display: flex; }
        .image-modal img { max-width: 90%; max-height: 90%; object-fit: contain; }
        .image-modal-close { position: absolute; top: 20px; right: 20px; background: none; border: none; color: white; font-size: 32px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="overlay" onclick="toggleSidebar()"></div>
    
    <div class="sidebar">
        <div class="sidebar-header">
            <button class="new-chat-btn" onclick="newChat()">+ 新对话</button>
        </div>
        <div class="chat-list" id="chatList"></div>
        <div class="sidebar-footer">
            <div class="current-api">
                <div class="current-api-label">当前 API</div>
                <div class="current-api-name" id="currentApiName">未配置</div>
            </div>
            <button class="settings-btn" onclick="openSettings()">⚙️ API 设置</button>
        </div>
    </div>

    <div class="main">
        <div class="chat-header">
            <button class="menu-btn" onclick="toggleSidebar()">☰</button>
            <span id="chatTitle">新对话</span>
        </div>
        <div class="messages" id="messages"></div>
        <div class="input-area">
            <div class="image-preview" id="imagePreview">
                <img id="previewImg" src="" alt="preview">
                <button class="image-preview-remove" onclick="removeImage()">×</button>
            </div>
            <div class="input-wrapper">
                <textarea id="input" placeholder="输入消息... (支持粘贴图片)" rows="1" onkeydown="handleKeydown(event)" onpaste="handlePaste(event)"></textarea>
                <div class="input-btns">
                    <label class="upload-btn" title="上传图片">
                        📷
                        <input type="file" accept="image/*" style="display:none" onchange="handleFileSelect(event)">
                    </label>
                    <button class="send-btn" id="sendBtn" onclick="sendMessage()">发送</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal" id="settingsModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>API 设置</h2>
                <button class="modal-close" onclick="closeSettings()">×</button>
            </div>
            <div class="api-tabs" id="apiTabs">
                <button class="api-tab active" onclick="switchApiTab(0)">API 1</button>
                <button class="api-tab" onclick="switchApiTab(1)">API 2</button>
                <button class="api-tab" onclick="switchApiTab(2)">API 3</button>
            </div>
            <div class="form-group">
                <label>API 名称（自定义标识）</label>
                <input type="text" id="apiName" placeholder="例如：Aipaibox Claude">
            </div>
            <div class="form-group">
                <label>API 地址</label>
                <input type="text" id="apiUrl" placeholder="https://api.example.com/v1/chat/completions">
            </div>
            <div class="form-group">
                <label>API Key</label>
                <input type="password" id="apiKey" placeholder="sk-...">
            </div>
            <div class="form-group">
                <label>模型名称</label>
                <input type="text" id="model" placeholder="claude-opus-4-7">
            </div>
            <div class="form-group">
                <label>系统提示词（可选）</label>
                <textarea id="systemPrompt" placeholder="你是一个有帮助的AI助手..."></textarea>
            </div>
            <button class="save-btn" onclick="saveSettings()">保存并使用此 API</button>
        </div>
    </div>

    <div class="image-modal" id="imageModal" onclick="closeImageModal()">
        <button class="image-modal-close">×</button>
        <img id="modalImage" src="" alt="">
    </div>

    <script>
        let chats = JSON.parse(localStorage.getItem('chats')) || [];
        let currentChatId = localStorage.getItem('currentChatId') || null;
        let apiConfigs = JSON.parse(localStorage.getItem('apiConfigs')) || [
            { name: 'Aipaibox', url: 'https://api.aipaibox.com/v1/chat/completions', key: '', model: 'claude-opus-4-7', systemPrompt: '' },
            { name: 'OpenRouter', url: 'https://openrouter.ai/api/v1/chat/completions', key: '', model: 'anthropic/claude-sonnet-4', systemPrompt: '' },
            { name: 'DeepSeek', url: 'https://api.deepseek.com/v1/chat/completions', key: '', model: 'deepseek-chat', systemPrompt: '' }
        ];
        let currentApiIndex = parseInt(localStorage.getItem('currentApiIndex')) || 0;
        let currentEditingApi = 0;
        let pendingImage = null;

        function init() {
            if (chats.length === 0) newChat();
            else renderChatList();
            if (currentChatId) loadChat(currentChatId);
            updateCurrentApiDisplay();
            autoResize(document.getElementById('input'));
        }

        function newChat() {
            const chat = { id: Date.now().toString(), title: '新对话', messages: [] };
            chats.unshift(chat);
            saveChats();
            loadChat(chat.id);
            renderChatList();
        }

        function renderChatList() {
            const list = document.getElementById('chatList');
            list.innerHTML = chats.map(chat => `
                <div class="chat-item ${chat.id === currentChatId ? 'active' : ''}" onclick="loadChat('${chat.id}')">
                    <span class="chat-item-title">${escapeHtml(chat.title)}</span>
                    <span class="chat-item-delete" onclick="event.stopPropagation(); deleteChat('${chat.id}')">🗑️</span>
                </div>
            `).join('');
        }

        function loadChat(id) {
            currentChatId = id;
            localStorage.setItem('currentChatId', id);
            const chat = chats.find(c => c.id === id);
            if (!chat) return;
            document.getElementById('chatTitle').textContent = chat.title;
            renderMessages(chat.messages);
            renderChatList();
            toggleSidebar(false);
        }

        function renderMessages(messages) {
            const container = document.getElementById('messages');
            container.innerHTML = messages.map(msg => {
                let content = '';
                if (msg.image) {
                    content += `<img class="message-image" src="${msg.image}" onclick="showImageModal('${msg.image}')" alt="uploaded image">`;
                }
                content += `<div>${escapeHtml(msg.content)}</div>`;
                return `
                    <div class="message ${msg.role}">
                        <div class="message-avatar">${msg.role === 'user' ? '你' : 'AI'}</div>
                        <div class="message-content">${content}</div>
                    </div>
                `;
            }).join('');
            container.scrollTop = container.scrollHeight;
        }

        function handleFileSelect(event) {
            const file = event.target.files[0];
            if (file) processImage(file);
            event.target.value = '';
        }

        function handlePaste(event) {
            const items = event.clipboardData?.items;
            if (!items) return;
            for (let item of items) {
                if (item.type.startsWith('image/')) {
                    event.preventDefault();
                    processImage(item.getAsFile());
                    break;
                }
            }
        }

        function processImage(file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                pendingImage = e.target.result;
                document.getElementById('previewImg').src = pendingImage;
                document.getElementById('imagePreview').classList.add('show');
            };
            reader.readAsDataURL(file);
        }

        function removeImage() {
            pendingImage = null;
            document.getElementById('imagePreview').classList.remove('show');
        }

        async function sendMessage() {
            const input = document.getElementById('input');
            const content = input.value.trim();
            if (!content && !pendingImage) return;

            const config = apiConfigs[currentApiIndex];
            if (!config.key) {
                alert('请先设置 API Key');
                openSettings();
                return;
            }

            const chat = chats.find(c => c.id === currentChatId);
            if (!chat) return;

            const userMessage = { role: 'user', content: content || '(图片)' };
            if (pendingImage) userMessage.image = pendingImage;
            
            chat.messages.push(userMessage);
            if (chat.title === '新对话' && content) {
                chat.title = content.slice(0, 20) + (content.length > 20 ? '...' : '');
                document.getElementById('chatTitle').textContent = chat.title;
                renderChatList();
            }
            saveChats();
            renderMessages(chat.messages);
            
            const sentImage = pendingImage;
            input.value = '';
            removeImage();
            autoResize(input);

            const messagesDiv = document.getElementById('messages');
            const loadingDiv = document.createElement('div');
            loadingDiv.className = 'message assistant';
            loadingDiv.innerHTML = `<div class="message-avatar">AI</div><div class="message-content"><div class="typing"><span></span><span></span><span></span></div></div>`;
            messagesDiv.appendChild(loadingDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;

            document.getElementById('sendBtn').disabled = true;

            try {
                const apiMessages = [];
                if (config.systemPrompt) {
                    apiMessages.push({ role: 'system', content: config.systemPrompt });
                }
                
                for (const msg of chat.messages) {
                    if (msg.image) {
                        apiMessages.push({
                            role: msg.role,
                            content: [
                                { type: 'image_url', image_url: { url: msg.image } },
                                { type: 'text', text: msg.content || '请描述这张图片' }
                            ]
                        });
                    } else {
                        apiMessages.push({ role: msg.role, content: msg.content });
                    }
                }

                const response = await fetch(config.url, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${config.key}`
                    },
                    body: JSON.stringify({
                        model: config.model,
                        messages: apiMessages,
                        max_tokens: 4096
                    })
                });

                if (!response.ok) {
                    const errorData = await response.json().catch(() => ({}));
                    throw new Error(errorData.error?.message || `HTTP ${response.status}`);
                }

                const data = await response.json();
                const assistantContent = data.choices[0].message.content;
                chat.messages.push({ role: 'assistant', content: assistantContent });
                saveChats();
                renderMessages(chat.messages);

            } catch (error) {
                loadingDiv.remove();
                alert('发送失败: ' + error.message);
            } finally {
                document.getElementById('sendBtn').disabled = false;
            }
        }

        function deleteChat(id) {
            if (!confirm('确定删除这个对话吗？')) return;
            chats = chats.filter(c => c.id !== id);
            if (currentChatId === id) {
                currentChatId = chats[0]?.id || null;
                if (currentChatId) loadChat(currentChatId);
                else newChat();
            }
            saveChats();
            renderChatList();
        }

        function openSettings() {
            currentEditingApi = currentApiIndex;
            renderApiTabs();
            loadApiForm(currentEditingApi);
            document.getElementById('settingsModal').classList.add('show');
        }

        function closeSettings() {
            document.getElementById('settingsModal').classList.remove('show');
        }

        function renderApiTabs() {
            const tabs = document.getElementById('apiTabs');
            tabs.innerHTML = apiConfigs.map((config, i) => `
                <button class="api-tab ${i === currentEditingApi ? 'active' : ''}" onclick="switchApiTab(${i})">
                    ${config.name || 'API ' + (i + 1)}
                </button>
            `).join('');
        }

        function switchApiTab(index) {
            saveCurrentForm();
            currentEditingApi = index;
            renderApiTabs();
            loadApiForm(index);
        }

        function loadApiForm(index) {
            const config = apiConfigs[index];
            document.getElementById('apiName').value = config.name || '';
            document.getElementById('apiUrl').value = config.url || '';
            document.getElementById('apiKey').value = config.key || '';
            document.getElementById('model').value = config.model || '';
            document.getElementById('systemPrompt').value = config.systemPrompt || '';
        }

        function saveCurrentForm() {
            apiConfigs[currentEditingApi] = {
                name: document.getElementById('apiName').value,
                url: document.getElementById('apiUrl').value,
                key: document.getElementById('apiKey').value,
                model: document.getElementById('model').value,
                systemPrompt: document.getElementById('systemPrompt').value
            };
        }

        function saveSettings() {
            saveCurrentForm();
            currentApiIndex = currentEditingApi;
            localStorage.setItem('apiConfigs', JSON.stringify(apiConfigs));
            localStorage.setItem('currentApiIndex', currentApiIndex);
            updateCurrentApiDisplay();
            closeSettings();
            alert('设置已保存，当前使用: ' + apiConfigs[currentApiIndex].name);
        }

        function updateCurrentApiDisplay() {
            const config = apiConfigs[currentApiIndex];
            document.getElementById('currentApiName').textContent = config.name || '未配置';
        }

        function showImageModal(src) {
            document.getElementById('modalImage').src = src;
            document.getElementById('imageModal').classList.add('show');
        }

        function closeImageModal() {
            document.getElementById('imageModal').classList.remove('show');
        }

        function saveChats() {
            localStorage.setItem('chats', JSON.stringify(chats));
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function handleKeydown(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        }

        function autoResize(textarea) {
            textarea.style.height = 'auto';
            textarea.style.height = Math.min(textarea.scrollHeight, 200) + 'px';
        }

        document.getElementById('input').addEventListener('input', function() {
            autoResize(this);
        });

        function toggleSidebar(show) {
            const sidebar = document.querySelector('.sidebar');
            const overlay = document.querySelector('.overlay');
            if (show === undefined) show = !sidebar.classList.contains('show');
            sidebar.classList.toggle('show', show);
            overlay.classList.toggle('show', show);
        }

        init();
    </script>
</body>
</html>
