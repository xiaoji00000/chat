<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Personal Study Workspace</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
</head>
<body>
    <div class="container">
        <aside class="sidebar">
            <div class="sidebar-section">
                <button id="new-chat-btn" class="primary-btn">➕ 新建对话</button>
            </div>

            <div class="sidebar-section session-container">
                <h3>对话历史</h3>
                <ul id="session-list" class="session-list"></ul>
            </div>

            <div class="sidebar-section">
                <h3>模型设置</h3>
                <input type="password" id="api-key-cc" placeholder="填 CC 分组 Key" />
                <input type="password" id="api-key-openai" placeholder="填 OpenAI 分组 Key" />
                <select id="model-select">
                    <option value="claude-opus-4-7">Claude Opus 4.7</option>
                    <option value="claude-opus-4-6-thinking">Claude Opus 4.6 Thinking</option>
                    <option value="gpt-5.4">gpt-5.4</option>
                </select>
            </div>
            
            <details class="memory-panel">
                <summary>🧠 分层记忆系统</summary>
                <div class="memory-inputs">
                    <textarea id="mem-identity" placeholder="身份 (例如: 严厉的 C++ 面试官)..."></textarea>
                    <textarea id="mem-context" placeholder="情境..."></textarea>
                    <textarea id="mem-preferences" placeholder="偏好 (例如: 只给思路，不给完整代码)..."></textarea>
                    <textarea id="mem-experience" placeholder="经验..."></textarea>
                    <textarea id="mem-activity" placeholder="活动..."></textarea>
                    <button id="save-mem-btn" class="secondary-btn">保存配置</button>
                </div>
            </details>

            <button id="delete-session-btn" class="danger-btn" style="margin-top: 15px;">🗑️ 删除当前对话</button>
        </aside>

        <main class="chat-area">
            <div id="chat-history" class="chat-history"></div>
            
            <div class="input-area">
                <div id="image-preview" class="image-preview hidden"></div>
                <div class="controls">
                    <label for="image-upload" class="custom-upload-btn">📷 图片</label>
                    <input type="file" id="image-upload" accept="image/*" style="display: none;" />
                    
                    <textarea id="user-input" placeholder="输入问题或代码... (Ctrl+Enter 发送)"></textarea>
                    <button id="send-btn" class="send-btn">发送</button>
                </div>
            </div>
        </main>
    </div>

    <script type="module" src="js/main.js"></script>
</body>
</html>
